[pytest]
# ---------------------------------------------------------------------------
# PeakPath backend test configuration
# ---------------------------------------------------------------------------

# Root test directory
testpaths = tests

# Minimum test discovery pattern
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity: -v for individual test names in output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -p no:cacheprovider

# Custom markers used in the test suite
markers =
    unit: Pure unit tests with no DB or HTTP (fast)
    integration: Tests that exercise the HTTP layer with the in-memory DB
    slow: Tests that are expected to take longer than 1 second

# Disable default warnings for cleaner output (re-enable when debugging)
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
